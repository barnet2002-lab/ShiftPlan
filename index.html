<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="ShiftPlan"/>
<meta name="theme-color" content="#110a0e"/>
<title>ShiftPlan</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#110a0e;overscroll-behavior:none}
body{font-family:'DM Sans','Segoe UI',sans-serif;color:#f5e6ec}
button{cursor:pointer;font-family:inherit;background:none;border:none}
input,select,textarea{font-family:inherit;outline:none;-webkit-appearance:none;appearance:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#3d1e2d;border-radius:2px}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.4)}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#110a0e}

/* Header */
.header{padding:13px 16px 10px;border-bottom:1px solid #261219;display:flex;align-items:center;justify-content:space-between;background:#110a0e;position:sticky;top:0;z-index:20}
.logo{width:27px;height:27px;border-radius:7px;background:linear-gradient(135deg,#f06292,#c2185b);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:9px}
.app-title{font-weight:700;font-size:16px;letter-spacing:-.3px}
.header-btns{display:flex;gap:6px}
.hbtn{padding:5px 12px;background:#1f1118;border:1px solid #331825;border-radius:7px;color:#c49aaa;font-size:12px;font-weight:500}

/* Tabs */
.tabs{display:flex;background:#110a0e;border-bottom:1px solid #261219;padding:0 16px}
.tab{padding:10px 14px 9px;background:none;border:none;font-size:13px;font-weight:600;color:#6b3a4e;border-bottom:2px solid transparent;transition:color .12s}
.tab.active{color:#f5e6ec;border-bottom:2px solid #f06292}
.badge-pill{margin-left:5px;background:rgba(247,196,79,.13);color:#f7c44f;font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px}

/* Nav bar */
.navbar{padding:9px 16px;display:flex;align-items:center;gap:7px;border-bottom:1px solid #261219}
.nav-btn{width:30px;height:30px;border:1px solid #331825;background:#1f1118;border-radius:7px;color:#c49aaa;font-size:17px;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:#2a1420}
.period-label{font-weight:600;font-size:13px;flex:1;letter-spacing:-.2px}
.today-btn{padding:4px 9px;border:1px solid #331825;background:#1f1118;border-radius:7px;color:#9e6e80;font-size:11px;font-weight:600}
.week-hrs{font-size:12px;color:#f06292;font-weight:700;background:rgba(240,98,146,.1);padding:3px 9px;border-radius:20px;font-family:'DM Mono',monospace}

/* Week view */
.week-view{flex:1;padding:8px 12px;display:flex;flex-direction:column;gap:5px}
.day-row{display:flex;align-items:center;border-radius:9px;padding:9px 11px;cursor:pointer;min-height:50px;transition:background .08s}
.day-row:active{filter:brightness(.85)}
.day-label{font-size:10px;color:#52293a;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.day-num{font-size:19px;font-weight:700;line-height:1.1}
.day-content{flex:1;padding-left:11px}
.shift-time-text{font-size:13px;font-weight:600;font-family:'DM Mono',monospace;color:#f5e6ec}
.shift-meta-row{display:flex;gap:6px;align-items:center;margin-top:2px}
.shift-hrs-badge{font-size:11px;color:#f06292;font-family:'DM Mono',monospace;font-weight:700}
.tag-pill{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:1px 6px;border-radius:4px}
.type-badge{font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px}
.empty-hint{font-size:12px;color:#3d1e2d}
.row-chevron{color:#331825;font-size:16px}

/* Month view */
.month-view{flex:1;padding:10px 12px 0}
.month-day-headers{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.month-day-lbl{text-align:center;font-size:10px;font-weight:700;color:#52293a;text-transform:uppercase;letter-spacing:.05em;padding-bottom:4px}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mc{background:#160c10;border:1px solid #271319;border-radius:7px;padding:7px 4px 5px;min-height:58px;cursor:pointer;transition:background .08s}
.mc.out-month{opacity:.22;cursor:default}
.mc:active:not(.out-month){filter:brightness(.8)}
.mc-num{font-size:13px;font-weight:600;margin-bottom:3px;text-align:center}
.mc-badge{font-size:9px;font-weight:700;border-radius:4px;padding:2px 3px;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}

/* Holidays view */
.holidays-view{flex:1;padding:12px 16px}
.holidays-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.holidays-count{font-size:13px;color:#9e6e80}
.add-holiday-btn{padding:5px 12px;background:rgba(247,196,79,.1);border:1px solid rgba(247,196,79,.27);border-radius:7px;color:#f7c44f;font-size:12px;font-weight:700}
.holiday-empty{text-align:center;padding:48px 0}
.holiday-empty-icon{font-size:32px;margin-bottom:12px}
.holiday-empty-title{font-size:14px;font-weight:600;color:#52293a}
.holiday-empty-sub{font-size:12px;color:#3d1e2d;margin-top:4px}
.holiday-row{display:flex;align-items:center;gap:12px;background:#160c10;border:1px solid #1c1c26;border-left:3px solid #f7c44f;border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:pointer}
.holiday-cal{width:40px;height:40px;background:rgba(247,196,79,.1);border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.holiday-cal-month{font-size:9px;color:#f7c44f;font-weight:700;text-transform:uppercase}
.holiday-cal-day{font-size:17px;font-weight:700;color:#f7c44f;line-height:1}
.holiday-name{font-size:14px;font-weight:600;color:#f5e6ec}
.holiday-note{font-size:12px;color:#9e6e80;margin-top:2px}
.del-x{color:#52293a;font-size:18px;padding:0 4px}
.other-years-sep{margin-top:20px;padding-top:14px;border-top:1px solid #261219}
.other-years-title{font-size:11px;color:#52293a;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.other-year-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e1016;cursor:pointer}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{background:#1a0d12;border-radius:20px 20px 0 0;border:1px solid #331825;border-bottom:none;padding:16px 18px 34px;width:100%;max-width:480px;animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.modal-handle{width:34px;height:4px;background:#3d1e2d;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:14px;letter-spacing:-.3px}

/* Form fields */
.field-label{font-size:10px;color:#9e6e80;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block}
.field-box{background:#110a0e;border:1px solid #331825;border-radius:9px;padding:9px 13px;display:flex;align-items:center;gap:9px;margin-bottom:12px}
.field-date-input{background:none;border:none;color:#f5e6ec;font-size:14px;font-weight:500;flex:1;width:100%}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.field-group{display:flex;flex-direction:column;gap:5px}
.time-input,.num-input,.select-input{background:#110a0e;border:1px solid #331825;border-radius:8px;color:#f5e6ec;padding:8px 9px;font-size:13px;font-family:'DM Mono',monospace;width:100%}
.select-input{font-family:'DM Sans',sans-serif;font-size:12px}
.live-hrs-box{background:rgba(240,98,146,.08);border:1px solid rgba(240,98,146,.2);border-radius:8px;padding:8px 13px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}

/* Type radio row */
.type-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.radio-opt{display:flex;align-items:center;gap:6px;cursor:pointer}
.radio-circle{width:19px;height:19px;border-radius:50%;flex-shrink:0;border:2px solid #52293a;display:flex;align-items:center;justify-content:center;transition:all .12s}
.radio-dot{width:6px;height:6px;border-radius:50%;background:#fff}
.radio-lbl{font-size:13px;font-weight:500;color:#9e6e80}
.radio-lbl.active{color:#f5e6ec}

/* Notes */
.notes-area{background:#110a0e;border:1px solid #331825;border-radius:8px;color:#f5e6ec;padding:9px 11px;font-size:13px;resize:none;line-height:1.5;width:100%;font-family:'DM Sans',sans-serif}
.notes-label-row{display:flex;align-items:center;gap:5px;margin-bottom:5px}

/* Modal action buttons */
.modal-actions{display:flex;gap:9px;margin-top:0}
.cancel-btn{flex:1;padding:12px;background:#1f1118;border:1px solid #331825;border-radius:10px;color:#9e6e80;font-weight:600;font-size:14px}
.save-btn{flex:2;padding:12px;border:none;border-radius:10px;font-weight:700;font-size:14px;color:#fff}
.delete-btn{flex:1;padding:13px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);border-radius:10px;color:#ef4444;font-weight:700;font-size:15px}
.edit-btn{flex:2;padding:13px;background:#f06292;border:none;border-radius:10px;color:#fff;font-weight:700;font-size:15px}
.close-link{width:100%;margin-top:9px;padding:10px;background:none;border:none;color:#6b3a4e;font-size:13px;font-weight:500}

/* Detail view */
.detail-date-small{font-size:12px;color:#9e6e80;font-weight:600;margin-bottom:2px}
.detail-type-row{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.detail-type-name{font-size:20px;font-weight:700;color:#f5e6ec;letter-spacing:-.3px}
.detail-type-badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.detail-times-box{background:#110a0e;border:1px solid #331825;border-radius:10px;padding:14px;margin-bottom:10px}
.detail-times-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-time-lbl{font-size:10px;color:#9e6e80;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.detail-time-val{font-size:18px;font-weight:700;color:#f5e6ec;font-family:'DM Mono',monospace}
.detail-hrs-row{border-top:1px solid #331825;padding-top:10px;display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.detail-hrs-lbl{font-size:12px;color:#9e6e80}
.detail-hrs-val{font-size:20px;font-weight:700;color:#f06292;font-family:'DM Mono',monospace}
.detail-tag-pill{display:inline-block;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.detail-note-box{background:#110a0e;border:1px solid #331825;border-radius:9px;padding:11px 13px;margin-bottom:10px}
.detail-note-lbl{font-size:10px;color:#9e6e80;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.detail-note-text{font-size:13px;color:#c49aaa;line-height:1.5}
.detail-actions{display:flex;gap:9px;margin-top:6px}

/* Sync modal */
.sync-tabs{display:flex;background:#110a0e;border-radius:9px;padding:3px;margin-bottom:18px;border:1px solid #331825}
.sync-tab{flex:1;padding:8px;border:none;border-radius:7px;font-size:13px;font-weight:600;color:#9e6e80;background:transparent}
.sync-tab.active{background:#331825;color:#f5e6ec}
.code-box{background:#110a0e;border:1px solid #331825;border-radius:9px;padding:12px;margin-bottom:14px;word-break:break-all;font-size:11px;color:#c49aaa;font-family:'DM Mono',monospace;max-height:100px;overflow-y:auto;line-height:1.6;user-select:all}
.copy-btn{width:100%;padding:13px;border:none;border-radius:10px;font-weight:700;font-size:14px;color:#fff;transition:background .2s}
.import-area{width:100%;background:#110a0e;border:1px solid #331825;border-radius:9px;color:#f5e6ec;padding:11px 12px;font-size:12px;font-family:'DM Mono',monospace;resize:none;line-height:1.5;margin-bottom:14px}
.import-area.has-error{border-color:#ef4444}
.import-error{font-size:12px;color:#ef4444;margin-bottom:12px}
.import-btn{width:100%;padding:13px;border:none;border-radius:10px;font-weight:700;font-size:14px}
.import-warn{font-size:11px;color:#52293a;text-align:center;margin-top:10px}
.cancel-link{width:100%;margin-top:10px;padding:11px;background:none;border:none;color:#6b3a4e;font-size:13px;font-weight:500}

/* Tag manager */
.tag-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.tag-chip{display:flex;align-items:center;gap:5px;border-radius:20px;padding:5px 10px;font-size:12px;font-weight:600}
.tag-chip-x{background:none;border:none;color:inherit;opacity:.6;font-size:14px;padding:0;line-height:1}
.tag-input-row{display:flex;gap:8px}
.tag-input{flex:1;background:#110a0e;border:1px solid #331825;border-radius:8px;color:#f5e6ec;padding:9px 12px;font-size:13px}
.tag-add-btn{padding:9px 14px;background:#f06292;border:none;border-radius:8px;color:#fff;font-weight:700}
.done-btn{width:100%;margin-top:11px;padding:12px;background:#1f1118;border:1px solid #331825;border-radius:10px;color:#9e6e80;font-weight:600}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

// ── Constants ──────────────────────────────────────────────
const DAYS_MON  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DAYS_ALL  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS    = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const TAG_COLORS= ['#f06292','#f7794f','#4fc88e','#c84fb0','#f7c44f','#4fd0f7','#a04ff7','#f74f6e'];
const SHIFT_TYPES   = ['Work Shift','Day Off','Date','Holiday'];
const TYPE_COLORS   = {'Work Shift':'#f06292','Day Off':'#f96b9f','Date':'#4fc88e','Holiday':'#f7c44f'};
const TYPE_INTERNAL = {'Work Shift':'shift','Day Off':'off','Date':'date','Holiday':'holiday'};
const INTERNAL_TYPE = {shift:'Work Shift',off:'Day Off',date:'Date',holiday:'Holiday'};

// ── Helpers ────────────────────────────────────────────────
const pad       = n => String(n).padStart(2,'0');
const dateKey   = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const keyToDate = k => { const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); };

function getMondayOfWeek(date) {
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
  return d;
}
function toMinutes(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function calcHours(start, end, brk) {
  if (!start||!end) return null;
  const diff = toMinutes(end)-toMinutes(start);
  if (diff<=0) return null;
  const w = diff-(parseInt(brk)||0);
  if (w<=0) return null;
  const h=Math.floor(w/60), m=w%60;
  return m===0 ? `${h}h` : `${h}h ${m}m`;
}
function formatTime(t) {
  if (!t) return '';
  const [h,m]=t.split(':').map(Number);
  return `${h%12||12}:${pad(m)} ${h>=12?'PM':'AM'}`;
}
function tagColor(tag, tags) {
  const i = tags.indexOf(tag);
  return TAG_COLORS[i >= 0 ? i % TAG_COLORS.length : 0];
}

// ── State ──────────────────────────────────────────────────
const today    = new Date();
const todayKey = dateKey(today);

let S = {
  currentDate:    new Date(today.getFullYear(), today.getMonth(), today.getDate()),
  viewMode:       'week',
  shifts:         {},
  tags:           ['Opening','Closing','Training'],
  tagManagerOpen: false,
  newTag:         '',
  dayModal:       null,   // {date, isEditing, screen:'detail'|'form'}
  modalType:      'Work Shift',
  modalForm:      {start:'',end:'',breakMin:'0',tag:'',note:''},
  modalDate:      '',
  syncOpen:       false,
  syncMode:       'export',
  importText:     '',
  importError:    '',
  copyDone:       false,
};

// Load from localStorage
try {
  const saved = localStorage.getItem('shiftplan_v2');
  if (saved) { const d=JSON.parse(saved); S.shifts=d.shifts||{}; S.tags=d.tags||S.tags; }
} catch(e) {}

function persist() {
  try { localStorage.setItem('shiftplan_v2', JSON.stringify({shifts:S.shifts,tags:S.tags,v:1})); } catch(e) {}
}
function set(updates) {
  Object.assign(S, updates);
  if ('shifts' in updates || 'tags' in updates) persist();
  render();
}

// ── DOM helpers ────────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k,v] of Object.entries(attrs)) {
      if (k === 'class') el.className = v;
      else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
      else if (k.startsWith('on') && typeof v === 'function') el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'disabled') el.disabled = !!v;
      else if (k === 'rows') el.rows = v;
      else if (k === 'placeholder') el.placeholder = v;
      else if (k === 'value') { if (tag==='input'||tag==='textarea') el.value = v; else el._val = v; }
      else el.setAttribute(k, v);
    }
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    el.appendChild(typeof c === 'string' || typeof c === 'number'
      ? document.createTextNode(String(c))
      : c);
  }
  // deferred select value
  if (el._val !== undefined) { const v=el._val; delete el._val; requestAnimationFrame(()=>{ el.value=v; }); }
  return el;
}
function t(text) { return document.createTextNode(String(text)); }

// ── Computed ───────────────────────────────────────────────
function getWeekDays() {
  const ws = getMondayOfWeek(S.currentDate);
  return Array.from({length:7},(_,i) => { const d=new Date(ws); d.setDate(d.getDate()+i); return d; });
}
function getMonthDays() {
  const ms = new Date(S.currentDate.getFullYear(), S.currentDate.getMonth(), 1);
  const start = getMondayOfWeek(ms);
  return Array.from({length:42},(_,i) => { const d=new Date(start); d.setDate(start.getDate()+i); return d; });
}
function getWeekHours(weekDays) {
  let total = 0;
  weekDays.forEach(d => {
    const s = S.shifts[dateKey(d)];
    if (s?.type==='shift' && s.start && s.end) {
      const diff = toMinutes(s.end)-toMinutes(s.start)-(parseInt(s.breakMin)||0);
      if (diff>0) total+=diff;
    }
  });
  return total>0 ? `${Math.floor(total/60)}h${total%60>0?` ${total%60}m`:''}` : null;
}
function getBadge(key) {
  const s = S.shifts[key]; if (!s) return null;
  return {
    shift:   {label: s.start ? formatTime(s.start).replace(' AM','a').replace(' PM','p') : 'Shift', color:'#f06292', bg:'rgba(240,98,146,.12)'},
    off:     {label:'Off',     color:'#c49aaa', bg:'rgba(196,154,170,.1)'},
    date:    {label:'Date',    color:'#4fc88e', bg:'rgba(79,200,142,.1)'},
    holiday: {label:'Holiday', color:'#f7c44f', bg:'rgba(247,196,79,.1)'},
  }[s.type] || null;
}
function getAllHolidays() {
  return Object.entries(S.shifts).filter(([,v])=>v.type==='holiday').sort(([a],[b])=>a.localeCompare(b));
}
function getPeriodLabel(weekDays) {
  if (S.viewMode==='week')
    return `${MONTHS[weekDays[0].getMonth()].slice(0,3)} ${weekDays[0].getDate()} – ${MONTHS[weekDays[6].getMonth()].slice(0,3)} ${weekDays[6].getDate()}, ${weekDays[6].getFullYear()}`;
  if (S.viewMode==='month') return `${MONTHS[S.currentDate.getMonth()]} ${S.currentDate.getFullYear()}`;
  return String(S.currentDate.getFullYear());
}
function exportCode() { return btoa(JSON.stringify({shifts:S.shifts,tags:S.tags,v:1})); }

// ── Actions ────────────────────────────────────────────────
function navigate(dir) {
  const d = new Date(S.currentDate);
  if (S.viewMode==='week') d.setDate(d.getDate()+dir*7);
  else if (S.viewMode==='month') d.setMonth(d.getMonth()+dir);
  else d.setFullYear(d.getFullYear()+dir);
  set({currentDate:d});
}
function openDayModal(key) {
  const ex = S.shifts[key];
  if (ex) {
    set({modalType:INTERNAL_TYPE[ex.type]||'Work Shift', modalForm:{start:ex.start||'',end:ex.end||'',breakMin:ex.breakMin||'0',tag:ex.tag||'',note:ex.note||''}, modalDate:key, dayModal:{date:key,isEditing:true,screen:'detail'}});
  } else {
    set({modalType:'Work Shift', modalForm:{start:'',end:'',breakMin:'0',tag:'',note:''}, modalDate:key, dayModal:{date:key,isEditing:false,screen:'form'}});
  }
}
function saveDayModal() {
  const type = TYPE_INTERNAL[S.modalType];
  if (type==='shift' && (!S.modalForm.start||!S.modalForm.end)) return;
  set({shifts:{...S.shifts,[S.modalDate]:{type,...S.modalForm}}, dayModal:null});
}
function removeDay(key) {
  const shifts = {...S.shifts}; delete shifts[key];
  set({shifts, dayModal:null});
}
function handleCopy() {
  const code = exportCode();
  navigator.clipboard.writeText(code).then(()=>{
    set({copyDone:true}); setTimeout(()=>set({copyDone:false}),2000);
  }).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=code; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    set({copyDone:true}); setTimeout(()=>set({copyDone:false}),2000);
  });
}
function handleImport() {
  try {
    const d = JSON.parse(atob(S.importText.trim()));
    if (!d.shifts||!d.tags) throw 0;
    set({shifts:d.shifts, tags:d.tags, syncOpen:false, importText:'', importError:''});
  } catch {
    set({importError:"That code doesn't look right — copy it exactly."});
  }
}
function addTag() {
  const t = S.newTag.trim();
  if (t && !S.tags.includes(t)) set({tags:[...S.tags,t], newTag:''});
  else set({newTag:''});
}

// ── Render functions ───────────────────────────────────────
function renderHeader(allHolidays) {
  return h('header',{class:'header'},
    h('div',{class:'header-left'},
      h('div',{class:'logo'},t('⏱')),
      h('span',{class:'app-title'},t('ShiftPlan'))
    ),
    h('div',{class:'header-btns'},
      h('button',{class:'hbtn',onClick:()=>set({tagManagerOpen:true})},t('Tags')),
      h('button',{class:'hbtn',onClick:()=>set({syncOpen:true,syncMode:'export'})},t('⇅ Sync'))
    )
  );
}

function renderTabs(allHolidays) {
  return h('div',{class:'tabs'},
    ...(['week','month','holidays']).map(v => {
      const labels = {week:'Week',month:'Month',holidays:'Holidays'};
      const btn = h('button',{class:`tab${S.viewMode===v?' active':''}`,onClick:()=>set({viewMode:v})},t(labels[v]));
      if (v==='holidays' && allHolidays.length>0) btn.appendChild(h('span',{class:'badge-pill'},t(allHolidays.length)));
      return btn;
    })
  );
}

function renderNavbar(weekDays, weekHrs) {
  const period = getPeriodLabel(weekDays);
  return h('div',{class:'navbar'},
    h('button',{class:'nav-btn',onClick:()=>navigate(-1)},t('‹')),
    h('button',{class:'nav-btn',onClick:()=>navigate(1)},t('›')),
    h('span',{class:'period-label'},t(period)),
    h('button',{class:'today-btn nav-btn',onClick:()=>set({currentDate:new Date(today.getFullYear(),today.getMonth(),today.getDate())})},t('Today')),
    ...(S.viewMode==='week' && weekHrs ? [h('span',{class:'week-hrs'},t(weekHrs))] : [])
  );
}

function renderWeekView(weekDays) {
  return h('div',{class:'week-view'},
    ...weekDays.map(day => {
      const key  = dateKey(day);
      const s    = S.shifts[key];
      const isSh = s?.type==='shift';
      const hrs  = isSh ? calcHours(s.start,s.end,s.breakMin) : null;
      const badge= getBadge(key);
      const tod  = key===todayKey;

      const numDiv = h('div',{style:{width:'40px',flexShrink:'0'}},
        h('div',{class:'day-label'},t(DAYS_MON[(day.getDay()+6)%7])),
        h('div',{class:'day-num',style:{color:tod?'#f06292':'#f5e6ec'}},t(day.getDate()))
      );

      let content;
      if (isSh) {
        content = h('div',{class:'day-content'},
          h('div',{class:'shift-time-text'},t(`${formatTime(s.start)} – ${formatTime(s.end)}`)),
          h('div',{class:'shift-meta-row'},
            ...(hrs?[h('span',{class:'shift-hrs-badge'},t(hrs))]:[]),
            ...(s.tag?[h('span',{class:'tag-pill',style:{color:tagColor(s.tag,S.tags),background:tagColor(s.tag,S.tags)+'20'}},t(s.tag))]:[])
          )
        );
      } else if (badge) {
        content = h('div',{class:'day-content'},h('span',{class:'type-badge',style:{color:badge.color,background:badge.bg}},t(badge.label)));
      } else {
        content = h('div',{class:'day-content'},h('span',{class:'empty-hint'},t('Tap to add')));
      }

      return h('div',{class:'day-row',style:{
          background:tod?'#1c0e14':'#160c10',
          border:`1px solid ${tod?'#f0629233':'#271319'}`,
          borderLeft:`3px solid ${tod?'#f06292':s?'#3d1e2d':'#271319'}`,
        },onClick:()=>openDayModal(key)},
        numDiv, content,
        h('div',{class:'row-chevron'},t('›'))
      );
    })
  );
}

function renderMonthView(monthDays) {
  return h('div',{class:'month-view'},
    h('div',{class:'month-day-headers'}, ...DAYS_MON.map(d=>h('div',{class:'month-day-lbl'},t(d)))),
    h('div',{class:'month-grid'},
      ...monthDays.map(day => {
        const key      = dateKey(day);
        const inMonth  = day.getMonth()===S.currentDate.getMonth();
        const badge    = getBadge(key);
        const tod      = key===todayKey;
        const cell = h('div',{class:`mc${tod?' mc-today':''}${!inMonth?' out-month':''}`,style:{
            border:`1px solid ${tod?'#f0629255':'#271319'}`,
            borderTop:tod?'2px solid #f06292':'1px solid #271319',
          }},
          h('div',{class:'mc-num',style:{color:tod?'#f06292':'#f5e6ec'}},t(day.getDate())),
          ...(badge?[h('div',{class:'mc-badge',style:{color:badge.color,background:badge.bg}},t(badge.label))]:[])
        );
        if (inMonth) cell.addEventListener('click',()=>openDayModal(key));
        return cell;
      })
    )
  );
}

function renderHolidaysView(allHolidays) {
  const yr    = S.currentDate.getFullYear();
  const thisY = allHolidays.filter(([k])=>k.startsWith(`${yr}-`));
  const otherY= allHolidays.filter(([k])=>!k.startsWith(`${yr}-`));

  return h('div',{class:'holidays-view'},
    h('div',{class:'holidays-top'},
      h('div',{class:'holidays-count'},t(`${thisY.length} holiday${thisY.length!==1?'s':''} in ${yr}`)),
      h('button',{class:'add-holiday-btn',onClick:()=>set({modalDate:todayKey,modalType:'Holiday',modalForm:{start:'',end:'',breakMin:'0',tag:'',note:''},dayModal:{date:todayKey,isEditing:false,screen:'form'}})},t('+ Add Holiday'))
    ),

    thisY.length===0
      ? h('div',{class:'holiday-empty'},
          h('div',{class:'holiday-empty-icon'},t('🎉')),
          h('div',{class:'holiday-empty-title'},t('No holidays yet')),
          h('div',{class:'holiday-empty-sub'},t('Tap any day and mark it as a Holiday'))
        )
      : h('div',{},
          ...thisY.map(([key,data]) => {
            const d = keyToDate(key);
            const row = h('div',{class:'holiday-row'},
              h('div',{class:'holiday-cal'},
                h('div',{class:'holiday-cal-month'},t(MONTHS[d.getMonth()].slice(0,3))),
                h('div',{class:'holiday-cal-day'},t(d.getDate()))
              ),
              h('div',{style:{flex:'1'}},
                h('div',{class:'holiday-name'},t(`${DAYS_ALL[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`)),
                ...(data.note?[h('div',{class:'holiday-note'},t(data.note))]:[])
              ),
              h('button',{class:'del-x',onClick:e=>{e.stopPropagation();removeDay(key);}},t('×'))
            );
            row.addEventListener('click',()=>openDayModal(key));
            return row;
          })
        ),

    ...(otherY.length>0 ? [
      h('div',{class:'other-years-sep'},
        h('div',{class:'other-years-title'},t('Other years')),
        ...otherY.map(([key,data]) => {
          const d = keyToDate(key);
          const row = h('div',{class:'other-year-row'},
            h('span',{style:{fontSize:'13px',color:'#9e6e80',fontFamily:"'DM Mono',monospace"}},t(key)),
            h('span',{style:{fontSize:'13px',color:'#c49aaa',flex:'1'}},t(DAYS_ALL[d.getDay()])),
            ...(data.note?[h('span',{style:{fontSize:'12px',color:'#6b3a4e'}},t(data.note))]:[]),
            h('button',{class:'del-x',onClick:e=>{e.stopPropagation();removeDay(key);}},t('×'))
          );
          row.addEventListener('click',()=>openDayModal(key));
          return row;
        })
      )
    ] : [])
  );
}

function renderDetailScreen() {
  const key       = S.modalDate;
  const s         = S.shifts[key];
  const hrs       = s?.type==='shift' ? calcHours(s.start,s.end,s.breakMin) : null;
  const d         = keyToDate(key);
  const typeLabel = INTERNAL_TYPE[s?.type] || '';
  const typeColor = TYPE_COLORS[typeLabel] || '#f06292';

  return h('div',{},
    h('div',{class:'detail-date-small'},t(`${DAYS_ALL[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`)),
    h('div',{class:'detail-type-row'},
      h('span',{class:'detail-type-name'},t(typeLabel)),
      h('span',{class:'detail-type-badge',style:{color:typeColor,background:typeColor+'20'}},t(typeLabel))
    ),

    ...(s?.type==='shift' ? [
      h('div',{class:'detail-times-box'},
        h('div',{class:'detail-times-grid'},
          h('div',{},h('div',{class:'detail-time-lbl'},t('Start')),h('div',{class:'detail-time-val'},t(formatTime(s.start)))),
          h('div',{},h('div',{class:'detail-time-lbl'},t('End')),h('div',{class:'detail-time-val'},t(formatTime(s.end))))
        ),
        ...(hrs?[h('div',{class:'detail-hrs-row'},
          h('span',{class:'detail-hrs-lbl'},t(`Total hours${parseInt(s.breakMin)>0?` (${s.breakMin}min break)`:''}`)),
          h('span',{class:'detail-hrs-val'},t(hrs))
        )]:[])
      ),
      ...(s.tag?[h('div',{},h('span',{class:'detail-tag-pill',style:{color:tagColor(s.tag,S.tags),background:tagColor(s.tag,S.tags)+'20'}},t(s.tag)))]:[])
    ] : []),

    ...(s?.note?[h('div',{class:'detail-note-box'},h('div',{class:'detail-note-lbl'},t('Note')),h('div',{class:'detail-note-text'},t(s.note)))]:[]),

    h('div',{class:'detail-actions'},
      h('button',{class:'delete-btn',onClick:()=>removeDay(key)},t('🗑 Delete')),
      h('button',{class:'edit-btn',onClick:()=>set({dayModal:{...S.dayModal,screen:'form'}})},t('✏️ Edit'))
    ),
    h('button',{class:'close-link',onClick:()=>set({dayModal:null})},t('Close'))
  );
}

function renderFormScreen() {
  const isEditing = S.dayModal?.isEditing;
  const liveHrs   = calcHours(S.modalForm.start, S.modalForm.end, S.modalForm.breakMin);
  const canSave   = S.modalType!=='Work Shift' || (S.modalForm.start && S.modalForm.end);

  return h('div',{},
    h('div',{class:'modal-title'},t(isEditing?'Edit Shift':'Add New Shift')),

    // Date
    h('div',{},
      h('label',{class:'field-label'},t('Date')),
      h('div',{class:'field-box'},
        h('span',{style:{fontSize:'15px',color:'#6b3a4e'}},t('📅')),
        h('input',{type:'date',class:'field-date-input',value:S.modalDate,onChange:e=>set({modalDate:e.target.value})})
      )
    ),

    // Type
    h('div',{style:{marginBottom:'14px'}},
      h('label',{class:'field-label',style:{marginBottom:'8px'}},t('Type')),
      h('div',{class:'type-row'},
        ...SHIFT_TYPES.map(type => {
          const active = S.modalType===type;
          const col    = TYPE_COLORS[type];
          const circle = h('div',{class:'radio-circle',style:{borderColor:active?col:'#52293a',background:active?col:'transparent'}},
            ...(active?[h('div',{class:'radio-dot'})]:[])
          );
          return h('div',{class:'radio-opt',onClick:()=>set({modalType:type})},
            circle,
            h('span',{class:`radio-lbl${active?' active':''}`},t(type))
          );
        })
      )
    ),

    // Shift-specific fields
    ...(S.modalType==='Work Shift' ? [
      h('div',{class:'two-col'},
        h('div',{class:'field-group'},h('label',{class:'field-label'},t('Start')),h('input',{type:'time',class:'time-input',value:S.modalForm.start,onChange:e=>set({modalForm:{...S.modalForm,start:e.target.value}})})),
        h('div',{class:'field-group'},h('label',{class:'field-label'},t('End')),  h('input',{type:'time',class:'time-input',value:S.modalForm.end,  onChange:e=>set({modalForm:{...S.modalForm,end:e.target.value}})}))
      ),
      h('div',{class:'two-col'},
        h('div',{class:'field-group'},h('label',{class:'field-label'},t('Break (min)')),h('input',{type:'number',class:'num-input',value:S.modalForm.breakMin,onChange:e=>set({modalForm:{...S.modalForm,breakMin:e.target.value}})})),
        h('div',{class:'field-group'},
          h('label',{class:'field-label'},t('Tag')),
          h('select',{class:'select-input',value:S.modalForm.tag,onChange:e=>set({modalForm:{...S.modalForm,tag:e.target.value}})},
            h('option',{value:''},t('No tag')),
            ...S.tags.map(tg=>h('option',{value:tg},t(tg)))
          )
        )
      ),
      ...(liveHrs?[h('div',{class:'live-hrs-box'},h('span',{style:{fontSize:'12px',color:'#9e6e80'}},t('Total hours')),h('span',{style:{fontSize:'16px',fontWeight:'700',color:'#f06292',fontFamily:"'DM Mono',monospace"}},t(liveHrs)))]:[])
    ] : []),

    // Notes
    h('div',{style:{marginBottom:'16px'}},
      h('div',{class:'notes-label-row'},h('span',{},t('📄')),h('label',{class:'field-label',style:{margin:'0'}},t('Notes'))),
      h('textarea',{class:'notes-area',rows:2,placeholder:'Optional notes for this day...',onChange:e=>set({modalForm:{...S.modalForm,note:e.target.value}})},t(S.modalForm.note))
    ),

    h('div',{class:'modal-actions'},
      h('button',{class:'cancel-btn',onClick:()=>isEditing?set({dayModal:{...S.dayModal,screen:'detail'}}):set({dayModal:null})},t(isEditing?'Back':'Cancel')),
      h('button',{class:'save-btn',style:{
          background: canSave ? (S.modalType==='Work Shift'?'#f06292':TYPE_COLORS[S.modalType]) : '#2a1420',
          color: canSave?'#fff':'#52293a',
          opacity: canSave?1:0.5,
        },onClick:saveDayModal},t('Save'))
    )
  );
}

function renderDayModal() {
  if (!S.dayModal) return null;
  const inner = S.dayModal.screen==='detail' ? renderDetailScreen() : renderFormScreen();
  return h('div',{class:'modal-overlay',onClick:()=>set({dayModal:null})},
    h('div',{class:'modal-sheet',onClick:e=>e.stopPropagation()},
      h('div',{class:'modal-handle'}),
      inner
    )
  );
}

function renderTagModal() {
  if (!S.tagManagerOpen) return null;
  return h('div',{class:'modal-overlay',onClick:()=>set({tagManagerOpen:false})},
    h('div',{class:'modal-sheet',onClick:e=>e.stopPropagation()},
      h('div',{class:'modal-handle'}),
      h('div',{class:'modal-title',style:{marginBottom:'4px'}},t('Manage Tags')),
      h('div',{style:{fontSize:'13px',color:'#9e6e80',marginBottom:'14px'}},t('Tags can be reused across shifts.')),
      h('div',{class:'tag-chips'},
        ...S.tags.map((tg,i)=>h('div',{class:'tag-chip',style:{background:TAG_COLORS[i%TAG_COLORS.length]+'18',border:`1px solid ${TAG_COLORS[i%TAG_COLORS.length]}33`,color:TAG_COLORS[i%TAG_COLORS.length]}},
          t(tg),
          h('button',{class:'tag-chip-x',onClick:()=>set({tags:S.tags.filter(x=>x!==tg)})},t('×'))
        ))
      ),
      h('div',{class:'tag-input-row'},
        h('input',{class:'tag-input',placeholder:'New tag...',value:S.newTag,onChange:e=>set({newTag:e.target.value}),onKeydown:e=>{if(e.key==='Enter')addTag();}}),
        h('button',{class:'tag-add-btn',onClick:addTag},t('Add'))
      ),
      h('button',{class:'done-btn',onClick:()=>set({tagManagerOpen:false})},t('Done'))
    )
  );
}

function renderSyncModal() {
  if (!S.syncOpen) return null;
  return h('div',{class:'modal-overlay',onClick:()=>set({syncOpen:false})},
    h('div',{class:'modal-sheet',onClick:e=>e.stopPropagation()},
      h('div',{class:'modal-handle'}),
      h('div',{class:'modal-title',style:{marginBottom:'4px'}},t('⇅ Sync Schedule')),
      h('div',{style:{fontSize:'13px',color:'#9e6e80',marginBottom:'16px'}},t('Export your schedule as a code, then paste it on another device to import.')),

      h('div',{class:'sync-tabs'},
        h('button',{class:`sync-tab${S.syncMode==='export'?' active':''}`,onClick:()=>set({syncMode:'export',importError:''})},t('📤 Export')),
        h('button',{class:`sync-tab${S.syncMode==='import'?' active':''}`,onClick:()=>set({syncMode:'import',importError:''})},t('📥 Import'))
      ),

      ...(S.syncMode==='export' ? [
        h('div',{style:{fontSize:'12px',color:'#9e6e80',marginBottom:'8px'}},t('Your schedule code — copy and paste it on your other device:')),
        h('div',{class:'code-box'},t(exportCode())),
        h('button',{class:'copy-btn',style:{background:S.copyDone?'#4fc88e':'#f06292'},onClick:handleCopy},t(S.copyDone?'✓ Copied!':'Copy Code'))
      ] : [
        h('div',{style:{fontSize:'12px',color:'#9e6e80',marginBottom:'8px'}},t('Paste your schedule code here:')),
        h('textarea',{class:`import-area${S.importError?' has-error':''}`,rows:4,placeholder:'Paste code here...',onChange:e=>set({importText:e.target.value,importError:''}),value:S.importText}),
        ...(S.importError?[h('div',{class:'import-error'},t(S.importError))]:[]),
        h('button',{class:'import-btn',style:{background:S.importText.trim()?'#f06292':'#2a1420',color:S.importText.trim()?'#fff':'#52293a',opacity:S.importText.trim()?1:0.5},disabled:!S.importText.trim(),onClick:handleImport},t('Import Schedule')),
        h('div',{class:'import-warn'},t('⚠️ This will replace your current schedule'))
      ]),

      h('button',{class:'cancel-link',onClick:()=>set({syncOpen:false})},t('Cancel'))
    )
  );
}

// ── Main render ────────────────────────────────────────────
function render() {
  const weekDays    = getWeekDays();
  const monthDays   = getMonthDays();
  const weekHrs     = getWeekHours(weekDays);
  const allHolidays = getAllHolidays();

  const viewEl =
    S.viewMode==='week'     ? renderWeekView(weekDays) :
    S.viewMode==='month'    ? renderMonthView(monthDays) :
                              renderHolidaysView(allHolidays);

  const app = h('div',{id:'app'},
    renderHeader(allHolidays),
    renderTabs(allHolidays),
    renderNavbar(weekDays, weekHrs),
    viewEl,
    ...[renderDayModal(), renderTagModal(), renderSyncModal()].filter(Boolean)
  );

  const old = document.getElementById('app');
  document.body.replaceChild(app, old);
}

render();
</script>
</body>
</html>
